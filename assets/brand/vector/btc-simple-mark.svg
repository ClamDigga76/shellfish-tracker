<path d="M144 269 C147 239, 166 214, 181 197" stroke="url(#gradGrass)" stroke-width="11" stroke-linecap="round"/>
<path d="M191 164 A152 152 0 0 1 388 230" stroke="url(#gradBlue)" stroke-width="8" fill="none"/>
<path d="M388 230 A152 152 0 0 1 407 300" stroke="url(#gradGold)" stroke-width="8" fill="none"/>
