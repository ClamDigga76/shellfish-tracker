    <stop offset="0%" stop-color="#5ED4FF"/>
    <stop offset="55%" stop-color="#2E8BFF"/>
    <stop offset="100%" stop-color="#2247FF"/>
  </linearGradient>
  <linearGradient id="gradGold" x1="0" y1="0" x2="1" y2="0">
