<svg xmlns="http://www.w3.org/2000/svg" width="512" height="64" viewBox="0 0 512 64" fill="none">

  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ED4FF"/>
      <stop offset="55%" stop-color="#2E8BFF"/>
      <stop offset="100%" stop-color="#2247FF"/>
    </linearGradient>
    <linearGradient id="gradGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD56A"/>
      <stop offset="100%" stop-color="#D7A32E"/>
    </linearGradient>
    <linearGradient id="gradGrass" x1="0" y1="1" x2="0.9" y2="0">
      <stop offset="0%" stop-color="#2E6B21"/>
      <stop offset="100%" stop-color="#8CCB43"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0B2550" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#03142B" stop-opacity="1"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlowSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

<rect width="512" height="64" rx="16" fill="transparent"/>
<line x1="40" y1="32" x2="220" y2="32" stroke="url(#gradGold)" stroke-width="4" stroke-linecap="round"/>
<line x1="292" y1="32" x2="472" y2="32" stroke="url(#gradGold)" stroke-width="4" stroke-linecap="round"/>
<rect x="236" y="20" width="20" height="20" transform="rotate(45 236 20)" fill="url(#gradGold)"/>
<rect x="242" y="26" width="8" height="8" transform="rotate(45 242 26)" fill="#03142B"/>
</svg>
