header{padding:14px 18px 12px}
.brandTitle{
  font-size:clamp(26px, 6vw, 34px);
  font-weight:860;
  letter-spacing:.15px;
}

/* Cards */
.card{
  background:linear-gradient(180deg, var(--glass) 0%, var(--glass2) 100%);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.18);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.card > b{
  display:block;
  font-size:17px;
  font-weight:850;
  letter-spacing:.2px;
  margin-bottom:8px;
}

/* Separators */
.sep{height:1px;background:var(--line);margin:10px 0;opacity:.85}

/* Buttons */
.btn{
  border-radius:var(--r-btn);
  font-weight:850;
  letter-spacing:.1px;
  background:var(--glass);
  border:1px solid var(--border);
  min-height:48px;
}
.btn.primary{
  background:linear-gradient(180deg, rgba(47,109,246,.95) 0%, rgba(31,111,235,.92) 100%);
  background:linear-gradient(180deg, var(--color-primary) 0%, var(--color-primary-press) 100%);
  border-color:rgba(47,109,246,.85);
  border-color:var(--color-primary);
  box-shadow:0 10px 26px rgba(31,111,235,.18);
}
.btn.danger{
  background:rgba(255,77,79,.14);
  border-color:rgba(255,77,79,.40);
}

/* Chips / segmented */
.filters{gap:10px}
.chip{
  border-radius:var(--r-pill);
  background:var(--glass);
  border:1px solid var(--border);
  font-weight:850;
  font-size:14px;
  padding:10px 14px;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
.chip.on{
  background:rgba(47,109,246,.25);
  border-color:rgba(120,160,255,.55);
}

/* Range pill */
.pill{
  border-radius:var(--r-pill);
  border:1px solid var(--border);
  background:var(--glass2);
}

/* Report table rows (C1) */
.trow{
  display:grid;
  grid-template-columns: 1fr auto;
  gap:12px;
  align-items:center;
  padding:10px 0;
}
.tname{font-weight:850;font-size:16px;letter-spacing:.15px}
.tsub{color:var(--muted);font-size:13px;margin-top:2px}
.tright{
  text-align:right;
  color:var(--muted);
  font-size:13px;
  display:grid;
  gap:2px;
}
.tright b{color:var(--text);font-weight:850}


/* Trip rows (C1) */
.triplist{display:flex;flex-direction:column}
.triplist .trip{
  padding:10px 2px;
  border-radius:14px;
  background:var(--glass2);
  border:1px solid var(--border);
}
.triplist .trip + .trip{margin-top:10px}
.triprow:active{transform:scale(.99)}
.metaRow{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.tmeta{color:var(--muted);font-size:13px}
.dot{color:var(--muted);font-size:12px;opacity:.5}
.catchCard{
  width:100%;
  text-align:left;
  color:var(--text);
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--glass2);
}
.catchCard .catchHead{
  color:var(--muted);
  font-size:12px;
  line-height:1.35;
}
.catchCard .catchMain{
  margin-top:4px;
  font-weight:850;
  font-size:16px;
  letter-spacing:.1px;
}
.catchCard .catchFoot{
  margin-top:8px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.catchCard .catchMetric{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--glass);
  padding:5px 8px;
  font-size:12px;
  line-height:1;
  white-space:nowrap;
}
.catchCard .catchMetric b{font-variant-numeric:tabular-nums}

/* KPI bar -> compact grid */
.pillbar{
  display:grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap:10px;
  margin-top:10px;
}
.pillbar .pill{
  padding:10px 12px;
  text-align:left;
}

/* Inputs + small buttons (C1) */
.input,.select,.textarea{
  background:var(--glass2) !important;
  border:1px solid var(--border) !important;
}
.input:focus-visible,.select:focus-visible,.textarea:focus-visible{
  outline:none;
  border-color:rgba(120,160,255,.55) !important;
  box-shadow:0 0 0 3px rgba(47,109,246,.18);
}
.smallbtn{
  border-radius:var(--r-pill);
  border:1px solid var(--border);
  background:var(--glass2);
  padding:10px 12px;
  font-weight:800;
}
.actions{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:10px;
}
.actions .btn{width:100%}

/* Charts (C1) */
.chart{
  width:100%;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--glass2);
}

/* ===== end C1 ===== */


/* Home dashboard header */
.dashCard{
  padding:14px;
  border-color:var(--border);
  background:linear-gradient(180deg, var(--glass) 0%, var(--glass2) 100%);
  box-shadow:0 10px 24px rgba(0,0,0,.24);
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
}
.dashCard:active{
  transform:translateY(1px) scale(.995);
  box-shadow:0 8px 18px rgba(0,0,0,.2);
}
.dashCard .homeFilterStack{
  display:grid;
  gap:10px;
  margin-top:10px;
  margin-bottom:12px;
}
.segWrap{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  padding:6px;
  border-radius:16px;
  background:var(--glass);
  border:1px solid var(--border);
}
.segWrap .segBtn{
  width:100%;
  border-radius:12px;
  padding:12px 10px;
  font-weight:800;
  letter-spacing:0.2px;
}
.segWrap .segBtn.on{
  background:rgba(47,109,246,0.35);
  border-color:rgba(47,109,246,0.55);
}
.segWrap .segBtn:disabled{
  opacity:0.35;
  pointer-events:none;
}
.kpiRow{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.kpiCard{
  min-width:0;
  min-height:clamp(78px, 21vw, 86px);
  padding:clamp(8px, 2.5vw, 10px) clamp(7px, 2.5vw, 9px) clamp(7px, 2.2vw, 8px);
  border-radius:18px;
  background:var(--glass);
  border:1px solid var(--border);
  box-shadow:0 6px 16px rgba(0,0,0,.18);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
}
.kpiValue.lbsBlue{color:var(--lbsBlue)!important}
.kpiValue{
  width:100%;
  max-width:100%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:1;
  min-height:0;
}
.kpiValueFit{
  display:inline-flex;
  align-items:baseline;
  justify-content:center;
  gap:.06em;
  max-width:100%;
  font-size:clamp(17px, calc(12.8px + 5.7vw), 32px);
  font-weight:900;
  line-height:0.98;
  letter-spacing:-0.24px;
  font-variant-numeric:tabular-nums;
  white-space:nowrap !important;
}
.kpiUnit{
  font-size:0.42em;
  font-weight:800;
  opacity:0.85;
  margin-left:0;
}
.kpiLabel{
  margin:0 0 clamp(4px, 1vw, 6px);
  font-size:clamp(12px, 2.8vw, 13px);
  font-weight:850;
  opacity:0.9;
  line-height:1.06;
  letter-spacing:.015em;
  white-space:normal;
  overflow:visible;
}

@media (max-width: 420px){
  .kpiValueFit{ font-size:clamp(16px, calc(11.8px + 5.3vw), 29px); }
  .kpiCard{ min-height:clamp(74px, 24vw, 82px); }
}

@media (max-width: 360px){
  .kpiRow{ gap:7px; }
  .kpiCard{ padding:8px 6px 7px; }
  .kpiValueFit{ font-size:clamp(15px, calc(10.8px + 5.1vw), 26px); letter-spacing:-0.2px; }
  .kpiLabel{ font-size:11.5px; line-height:1.04; }
}


/* Page header (Option B: icon + title) */
.pageHeader{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 14px 8px;
}
.pageHeader .phIcon{
  width:20px;height:20px;flex:0 0 20px;
  color:var(--muted);
}
.pageHeader .phIcon svg{width:20px;height:20px;display:block}
.pageHeader .phTitle{
  font-size:18px;
  font-weight:900;
  letter-spacing:.2px;
  margin:0;
  line-height:1.1;
}



/* ===== Titles: centered + enlarged + divider (v38) ===== */
.pageHeader{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  margin:10px 0 14px;
  padding:0 12px;
  position:relative;
}
.pageHeader::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-6px;
  width:70%;
  height:1px;
  background:var(--line);
}
.phTitle{
  margin:0;
  font-size:clamp(22px,5.2vw,28px) !important;
  font-weight:850 !important;
  letter-spacing:0.1px !important;
  text-align:center;
  color:var(--color-header-text) !important;
  font-family:inherit !important;
}

.pageHeader > div > div:last-child{
  background:var(--color-header-bg) !important;
  border:1px solid var(--color-border-strong) !important;
}
.phIcon svg{
  width:18px;
  height:18px;
  opacity:0.9;
}

/* Card titles: style <b> at top of a card as a centered header */
.card > b:first-child{
  display:block;
  text-align:center;
  font-size:clamp(14px,3.8vw,18px);
  font-weight:750;
  margin:2px 0 10px;
  position:relative;
  padding-bottom:8px;
}
.card > b:first-child::after{
  content:"";
  display:block;
  width:70%;
  height:1px;
  background:var(--line);
  margin:8px auto 0;
}
.card > b:first-child + .sep{
  display:none;
}


/* ===== Chip grids (Trips/Reports) ===== */
.chipGrid{ display:grid; gap:10px; }
.chipGrid.cols-3{ grid-template-columns: repeat(3, 1fr); }
.chipGrid.cols-4{ grid-template-columns: repeat(4, 1fr); }

.chipGrid.cols-2{ grid-template-columns: repeat(2, 1fr); }
@media (max-width: 380px){
  .chipGrid.cols-3{ grid-template-columns: repeat(2, 1fr); }
}
.chipGrid .chip{ width:100%; justify-content:center; }



body.scrollLock{
  overflow:hidden;
  overscroll-behavior:none;
}

/* v59: modal confirm overlay */
.modalOverlay{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index:9999;
  pointer-events:auto;
}
.modalCard{ width:min(420px, 100%); }


.settingsEmail{color:var(--text);text-decoration:underline}

/* v71: New Trip bottom sticky actions */
.tripActionBar{
  position: sticky;
  bottom: 0;
  padding: 10px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, var(--glass) 0%, var(--bg) 100%);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--line);
  z-index: 40;
}
.tripActionRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* v81: modal (quick add) */
.modalRoot{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  padding-bottom:calc(16px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,.45);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  pointer-events:auto;
}
.modalRoot.hidden{ display:none; }
.modalSheet{
  width:min(560px, 100%);
  background: linear-gradient(180deg, var(--glass) 0%, var(--glass2) 100%);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow: 0 18px 55px rgba(0,0,0,.55);
  overflow:hidden;
}
.modalHdr{
  padding:14px 16px 10px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.modalTitle{ font-weight:800; letter-spacing:.04em; text-transform:uppercase; font-size:12px; opacity:.9; }
.modalBody{ padding:14px 16px 16px 16px; }
.modalActions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  padding:0 16px 16px 16px;
}
.modalErr{
  margin-top:10px;
  font-size:12px;
  opacity:.9;
  color: var(--danger, #ff6b6b);
}

</style>
</head>
<body>
  <div class="phone">
<main id="app"></main>
</div>

  <script type="module" src="./js/bootstrap_v5.js?v=199"></script>

  <div id="swUpdateBanner" class="card safeBottom" style="position:fixed;left:12px;right:12px;bottom:calc(var(--tabbar-total-h) + 18px);z-index:9999;display:none">
    <b>Update available</b>
    <div class="muted small" style="margin-top:6px;line-height:1.35">
      A new version is ready. Reload to apply it.
    </div>
    <div class="row" style="margin-top:10px;gap:10px">
      <button class="btn good" id="swUpdateApply">Reload now</button>
      <button class="btn" id="swUpdateDismiss">Later</button>
    </div>
  </div>

<div id="tabbar" aria-label="Primary navigation"></div>
  <div id="toast"></div>
  <div id="ariaLive" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <div id="modalRoot" class="modalRoot hidden" aria-hidden="true"></div>
</body>
</html>
